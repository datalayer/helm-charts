operator:
  # RBAC Configuration
  rbac:
    # Create RBAC resources (ServiceAccount, ClusterRole, ClusterRoleBinding)
    create: true
    # Name of the ServiceAccount to create
    serviceAccountName: "datalayer-operator-sa"
    # Optional annotations (for example Azure Workload Identity binding).
    annotations: {}
  image: datalayer/operator:1.0.20
  sidecar:
    image: datalayer/whoami:0.0.6
  imagePullPolicy: Always
  crds: true
  port: 2111
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: role.datalayer.io/api
                operator: In
                values:
                  - "true"
  env:
    AWS_ACCESS_KEY_ID: ""
    AWS_DEFAULT_REGION: ""
    AWS_SECRET_ACCESS_KEY: ""
    DATALAYER_AUTHZ_ENGINE: "openfga"
    DATALAYER_AVAILABLE_RUNTIMES_MAX_LIFE_SEC: "3600"
    DATALAYER_CERT_ISSUER: "letsencrypt"
    DATALAYER_DOCKER_REGISTRY: ""
    DATALAYER_IAM_API_KEY: ""
    DATALAYER_IAM_URL: "http://datalayer-iam-svc.datalayer-api.svc.cluster.local:9700"
    DATALAYER_INGRESS_CLASS_NAME: "datalayer-traefik"
    DATALAYER_KAFKA_PASSWORD: ""
    DATALAYER_KAFKA_URL: "datalayer-kafka-kafka-bootstrap.datalayer-kafka.svc.cluster.local:9092"
    DATALAYER_KAFKA_USERNAME: ""
    DATALAYER_OPERATOR_API_KEY: ""
    DATALAYER_PUBSUB_ENGINE: "pulsar"
    DATALAYER_PULSAR_URL: "pulsar://datalayer-pulsar-broker.datalayer-pulsar.svc.cluster.local:6650"
    DATALAYER_RUNTIMES_RUN_HOOKS: "false"
    DATALAYER_RUN_URL: ""
    # Scaling configuration
    AGENT_OP_FEATURES: ""
    DATALAYER_SCALING_STRATEGY: "simple"
    DATALAYER_SCALING_DRY_RUN: "true"
    DATALAYER_SCALING_MIN_NODES: "0"
    DATALAYER_SCALING_MAX_NODES: "100"
    DATALAYER_SCALING_TICK_INTERVAL_SECONDS: "5"
    DATALAYER_SCALING_PRESSURE_SCALE_UP_THRESHOLD: "1"
    DATALAYER_SCALING_PRESSURE_SCALE_DOWN_THRESHOLD: "0"
    DATALAYER_SCALING_SCALE_DOWN_MAX_STEP: "1"
    DATALAYER_SCALING_SCALE_DOWN_HEADROOM_MULTIPLIER: "2"
    DATALAYER_SCALING_COOLDOWN_SECONDS: "30"
    DATALAYER_SCALING_EVENT_DEDUP_SECONDS: "5"
    DATALAYER_SCALING_HISTORY_MAX_EVENTS: "512"
    DATALAYER_SCALING_EVENTS_TOPIC: "operator-scaling-events-topic"
    DATALAYER_SCALING_COMMANDS_TOPIC: "operator-scaling-commands-topic"
    DATALAYER_SCALING_COMMANDS_DLQ_TOPIC: "operator-scaling-commands-dlq-topic"
    DATALAYER_SCALING_COMMANDS_SUBSCRIPTION: "datalayer-operator-scaling"
    DATALAYER_SCALING_COMMANDS_MAX_REDELIVERIES: "5"
    DATALAYER_SCALING_COMMANDS_RETRY_DELAY_SECONDS: "5"
    DATALAYER_SCALING_MIN_HEADROOM_CPU_MILLIS: "1000"
    DATALAYER_SCALING_MIN_HEADROOM_MEMORY_MB: "1024"
    # Clouder scaling executor configuration (always Python mode)
    DATALAYER_CLOUDER_CLUSTER_NAME: ""
    DATALAYER_CLOUDER_OS_DISK_SIZE_GB: ""
    DATALAYER_CLOUDER_EXECUTOR_PYTHON_TIMEOUT_SECONDS: "300"
    AZURE_TENANT_ID: ""
    AZURE_CLIENT_ID: ""
    AZURE_CLIENT_SECRET: ""
    AZURE_SUBSCRIPTION_ID: ""
    AZURE_RESOURCE_GROUP: ""
    DATALAYER_SOLR_CHECKPOINT_COLLECTION: "runtime-checkpoints"
    DATALAYER_SOLR_PASSWORD: ""
    DATALAYER_SOLR_USERNAME: ""
    DATALAYER_SOLR_ZK_HOST: "solr-datalayer-solrcloud-zookeeper-headless.datalayer-solr.svc.cluster.local:2181"
    DATALAYER_VAULT_TOKEN: ""
    DATALAYER_VAULT_URL: "http://datalayer-vault-internal.datalayer-vault.svc.cluster.local:8200"
    # CRIU checkpoint/restore configuration
    DATALAYER_AGENT_CHECKPOINTER_IMAGE: "datalayer/agent-checkpointer:0.0.1"
    DATALAYER_S3_CHECKPOINT_URL: "https://s3.us-west-2.amazonaws.com"
    # OTEL configuration
    DATALAYER_OTEL_API_KEY: ""
    OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: "https://prod1.datalayer.run/api/otel/v1/otlp/v1/logs"
    OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "https://prod1.datalayer.run/api/otel/v1/otlp/v1/metrics"
    OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "https://prod1.datalayer.run/api/otel/v1/otlp/v1/traces"
    OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
    OTEL_SDK_DISABLED: "false"
    OTEL_PYTHON_LOG_LEVEL: "info"
  tolerations: {}
  volumeMounts: {}
  sharedFsPVC: ""
  # Optional cloud credentials secret mounted as environment variables.
  # When enabled, deployment consumes AWS_* and AZURE_* from this secret.
  cloudCredentials:
    enabled: false
    create: false
    secretName: ""
    aws:
      accessKeyId: ""
      secretAccessKey: ""
      defaultRegion: ""
    azure:
      tenantId: ""
      clientId: ""
      clientSecret: ""
      subscriptionId: ""
      resourceGroup: ""
  # Kubelet client certificates (PEM content, set via --set-file in up.sh).
  # When provided, a Secret is created and mounted at /etc/kubelet-certs/.
  kubeletCerts:
    cert: ""
    key: ""
    mountPath: /etc/kubelet-certs
