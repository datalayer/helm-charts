operator:
  # RBAC Configuration
  rbac:
    # Create RBAC resources (ServiceAccount, ClusterRole, ClusterRoleBinding)
    create: true
    # Name of the ServiceAccount to create
    serviceAccountName: "datalayer-operator-sa"
  image: datalayer/operator:1.0.20
  sidecar:
    image: datalayer/whoami:0.0.6
  imagePullPolicy: Always
  crds: true
  port: 2111
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: role.datalayer.io/api
                operator: In
                values:
                  - "true"
  env:
    AWS_ACCESS_KEY_ID: ""
    AWS_DEFAULT_REGION: ""
    AWS_SECRET_ACCESS_KEY: ""
    DATALAYER_AUTHZ_ENGINE: "openfga"
    DATALAYER_AVAILABLE_RUNTIMES_MAX_LIFE_SEC: "3600"
    DATALAYER_CERT_ISSUER: "letsencrypt"
    DATALAYER_DOCKER_REGISTRY: ""
    DATALAYER_IAM_API_KEY: ""
    DATALAYER_IAM_URL: "http://datalayer-iam-svc.datalayer-api.svc.cluster.local:9700"
    DATALAYER_INGRESS_CLASS_NAME: "datalayer-traefik"
    DATALAYER_KAFKA_PASSWORD: ""
    DATALAYER_KAFKA_URL: "datalayer-kafka-kafka-bootstrap.datalayer-kafka.svc.cluster.local:9092"
    DATALAYER_KAFKA_USERNAME: ""
    DATALAYER_RUNTIMES_RUN_HOOKS: "false"
    DATALAYER_OPERATOR_API_KEY: ""
    DATALAYER_PUB_SUB_ENGINE: "kafka"
    DATALAYER_PULSAR_URL: "pulsar://datalayer-pulsar-broker.datalayer-pulsar.svc.cluster.local:6650"
    DATALAYER_RUN_URL: ""
    DATALAYER_SOLR_ZK_HOST: "solr-datalayer-solrcloud-zookeeper-headless.datalayer-solr.svc.cluster.local"
    DATALAYER_VAULT_TOKEN: ""
    DATALAYER_VAULT_URL: "http://datalayer-vault-internal.datalayer-vault.svc.cluster.local:8200"
    # CRIU checkpoint/restore configuration
    DATALAYER_CRIU_HELPER_IMAGE: "datalayer/criu-helper:0.0.1"
    DATALAYER_S3_CHECKPOINT_URL: "https://s3.us-west-2.amazonaws.com"
    # OTEL configuration
    OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: "https://prod1.datalayer.run/api/otel/v1/otlp/v1/logs"
    OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "https://prod1.datalayer.run/api/otel/v1/otlp/v1/metrics"
    OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "https://prod1.datalayer.run/api/otel/v1/otlp/v1/traces"
    OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
    DATALAYER_OTEL_API_KEY: ""
    OTEL_SDK_DISABLED: "false"
    OTEL_PYTHON_LOG_LEVEL: "info"
  tolerations: {}
  volumeMounts: {}
  sharedFsPVC: ""
  # Kubelet client certificates (PEM content, set via --set-file in up.sh).
  # When provided, a Secret is created and mounted at /etc/kubelet-certs/.
  kubeletCerts:
    cert: ""
    key: ""
    mountPath: /etc/kubelet-certs
