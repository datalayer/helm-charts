apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ default .Values.operator.namespace .Release.Namespace }}
  labels:
    app: {{ template "operator.app-name" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ template "operator.app-name" . }}
  strategy:
    rollingUpdate:
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ template "operator.app-name" . }}
        release: {{ .Release.Name }}
        datalayer.io/app: {{ template "operator.app-name" . }}
      annotations:
        karpenter.sh/do-not-disrupt: "true"      
    spec:
      serviceAccountName: {{ .Values.operator.rbac.serviceAccountName }}
      # NOTE (for later): if operator auth falls back to anonymous, consider
      # re-enabling service account token automount.
      # automountServiceAccountToken: true
      terminationGracePeriodSeconds: 0
      {{- with .Values.operator.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      imagePullSecrets:
        - name: reg-creds
      {{- if .Values.operator.sharedFsPVC }}
      securityContext:
        # Must match KERNEL_GID
        fsGroup: 100
      {{- end }}
      containers:
        - name: operator
          image: {{ .Values.operator.image }}
          imagePullPolicy: {{ .Values.operator.imagePullPolicy }}
          {{- if .Values.operator.cloudCredentials.enabled }}
          envFrom:
            - secretRef:
                name: {{ include "operator.cloud-credentials-secret-name" . }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.operator.port }}
              protocol: TCP
          {{- if or .Values.operator.sharedFsPVC .Values.operator.env }}
          env:
            {{- if .Values.operator.sharedFsPVC }}
            - name: 'DATALAYER_SHARED_FS_VOLUME_CLAIM_NAME'
              value: {{ .Values.operator.sharedFsPVC }}
            {{- end }}
            - name: DATALAYER_OPERATOR_SERVICE_ACCOUNT
              value: {{ .Values.operator.rbac.serviceAccountName | quote }}
            {{- if and .Values.operator.kubeletCerts.cert .Values.operator.kubeletCerts.key }}
            - name: KUBELET_CLIENT_CERT
              value: "{{ .Values.operator.kubeletCerts.mountPath }}/tls.crt"
            - name: KUBELET_CLIENT_KEY
              value: "{{ .Values.operator.kubeletCerts.mountPath }}/tls.key"
            {{- end }}
            - name: DATALAYER_CLOUDER_CLUSTER_NAME
              value: {{ (index .Values.operator.env "DATALAYER_CLOUDER_CLUSTER_NAME" | default "") | quote }}
            {{- range $key, $value := .Values.operator.env }}
            {{- if eq $key "DATALAYER_CLOUDER_CLUSTER_NAME" }}
            {{- else }}
            {{- $isCloudCredentialKey := or (eq $key "AWS_ACCESS_KEY_ID") (eq $key "AWS_DEFAULT_REGION") (eq $key "AWS_SECRET_ACCESS_KEY") (eq $key "AZURE_TENANT_ID") (eq $key "AZURE_CLIENT_ID") (eq $key "AZURE_CLIENT_SECRET") (eq $key "AZURE_SUBSCRIPTION_ID") (eq $key "AZURE_RESOURCE_GROUP") }}
            {{- if and $.Values.operator.cloudCredentials.enabled $isCloudCredentialKey }}
            {{- else }}
            - name: {{ $key }}
              {{- if kindIs "map" $value }}
              valueFrom: {{- $value | toYaml | nindent 16}}
              {{- else }}
              value: {{ $value | quote }}
              {{- end }}
            {{- end }}
            {{- end }}
            {{- end }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /api/operator/version
              port: 2111
            successThreshold: 1
            failureThreshold: 5
            initialDelaySeconds: 5
            periodSeconds: 15
          {{- with .Values.operator.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.operator.sharedFsPVC .Values.operator.volumeMounts (and .Values.operator.kubeletCerts.cert .Values.operator.kubeletCerts.key) }}
          volumeMounts:
            {{- if .Values.operator.sharedFsPVC }}
            - name: "shared-fs-data"
              mountPath: "/mnt/shared-fs"
            {{- end }}
            {{- if and .Values.operator.kubeletCerts.cert .Values.operator.kubeletCerts.key }}
            - name: kubelet-certs
              mountPath: {{ .Values.operator.kubeletCerts.mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.operator.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
#        - name: operator-sidecar
#          image: {{ .Values.operator.sidecar.image }}
#          imagePullPolicy: {{ .Values.operator.imagePullPolicy }}
#          args: ["proxy", "-p", "8001"]
      {{- if or .Values.operator.sharedFsPVC (and .Values.operator.kubeletCerts.cert .Values.operator.kubeletCerts.key) }}
      volumes:
        {{- if .Values.operator.sharedFsPVC }}
        - name: "shared-fs-data"
          persistentVolumeClaim:
            claimName: {{ .Values.operator.sharedFsPVC }}
            readOnly: False
        {{- end }}
        {{- if and .Values.operator.kubeletCerts.cert .Values.operator.kubeletCerts.key }}
        - name: kubelet-certs
          secret:
            secretName: {{ .Release.Name }}-kubelet-certs
        {{- end }}
      {{- end }}
