{{ if eq .Values.scheduler.clusterType "any" -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scheduler-ingress
  annotations:
    cert-manager.io/acme-challenge-type: http01
    cert-manager.io/cluster-issuer: {{ .Values.scheduler.certificateIssuer }}
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/affinity-mode: persistent
    nginx.ingress.kubernetes.io/session-cookie-expires: '172800'
    nginx.ingress.kubernetes.io/session-cookie-max-age: '172800'
    nginx.ingress.kubernetes.io/session-cookie-samesite: None
    nginx.ingress.kubernetes.io/session-cookie-name: scheduler-affinity
    nginx.ingress.kubernetes.io/enable-modsecurity: 'true'
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: 'true'
    traefik.ingress.kubernetes.io/router.tls: 'true'
  labels:
    app: scheduler
spec:
  ingressClassName: {{ .Values.scheduler.ingressClass }}
  tls:
  - hosts:
    - {{ template "scheduler.runHost" . }}
    secretName: {{ template "scheduler.runHost" . }}-datalayer-api-cert-secret
  rules:
  - host: {{ template "scheduler.runHost" . }}
    http:
      paths:
      - path: /api/scheduler
        pathType: Prefix
        backend:
          service:
            name: {{ template "scheduler.service-name" . }}
            port:
              number: {{ .Values.scheduler.port }}
{{- end }}
