apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-svc
  labels:
    app: {{ template "runtime-pools.name" . }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
  annotations:
    cloud.google.com/backend-config: '{"ports": {"runtime-pools-http": "runtime-pools-backend-config"}}'
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.runtime-pools.port }}
    name: runtime-pools-http
    protocol: TCP
    targetPort: {{ .Values.runtime-pools.port }}
  selector:
    app: {{ template "runtime-pools.name" . }}
    release: {{ .Release.Name }}
#  externalTrafficPolicy: Local       # Important?!
