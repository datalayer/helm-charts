apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ template "runtime-pools.name" . }}
spec:
  replicas: {{ .Values.runtime-pools.replicaCount }}
  selector:
    matchLabels:
      app: {{ template "runtime-pools.name" . }}
  strategy:
    rollingUpdate:
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ template "runtime-pools.name" . }}
        release: {{ .Release.Name }}
    spec:
      terminationGracePeriodSeconds: 0
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: role.datalayer.io/runtime
                operator: In
                values:
                - "true"
              - key: xpu.datalayer.io/cpu
                operator: In
                values:
                - "true"
{{ if eq .Values.runtime-pools.clusterType "minikube" }}
#      volumes:
#        - name: nfs-volume
#          nfs:
#            server: 172.17.0.8
#            path: /
#            readOnly: no
{{- end }}
      containers:
        - name: runtime-pools
          image: {{ .Values.runtime-pools.image }}
          imagePullPolicy: {{ .Values.runtime-pools.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.runtime-pools.port }}
              protocol: TCP
          env:
          - name: DATALAYER_RUN_URL
            value: {{ .Values.runtime-pools.env.DATALAYER_RUN_URL }}
          - name: JUPYTER_BASE_URL
            value: /api/jupyter-server
#          - name: GITHUB_CLIENT_ID
#            value: {{ .Values.runtime-pools.env.GITHUB_CLIENT_ID }}
#          - name: GITHUB_CLIENT_SECRET
#            value: {{ .Values.runtime-pools.env.GITHUB_CLIENT_SECRET }}
#          - name: GITHUB_OAUTH_CALLBACK_URL
#            value: {{ .Values.runtime-pools.env.GITHUB_OAUTH_CALLBACK_URL }}
{{- if .Values.runtime-pools.extraEnvVars }}
{{ toYaml .Values.runtime-pools.extraEnvVars | indent 10 }}
{{- end }}
          readinessProbe:
            httpGet:
              path: /api/jupyter-server/login
              port: 2300
            successThreshold: 1
            failureThreshold: 5
            initialDelaySeconds: 5
            periodSeconds: 15
          volumeMounts:
{{ if eq .Values.runtime-pools.clusterType "minikube" }}
#            - name: nfs-volume
#              mountPath: /data
{{- end }}
          resources:
{{ toYaml .Values.runtime-pools.resources | indent 12 }} 
#        - name: runtime-pools-sidecar
#          image: {{ .Values.runtime-pools.sidecar.image }}
#          imagePullPolicy: {{ .Values.runtime-pools.imagePullPolicy }}
#          args: ["proxy", "-p", "8001"]
