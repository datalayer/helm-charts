{{- if .Values.ray.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    cert-manager.io/acme-challenge-type: http01
    cert-manager.io/cluster-issuer: {{ .Values.ray.certificateIssuer }}
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'
    traefik.ingress.kubernetes.io/router.tls: 'true'
spec:
  ingressClassName: {{ .Values.ray.ingress.className }}
  rules:
    - host: {{ .Values.ray.ingress.host }}
      http:
        paths:
          - path: /api/ray
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-svc
                port:
                  number: {{ .Values.ray.port }}
  tls:
    - hosts:
        - {{ .Values.ray.ingress.host }}
      secretName: {{ default (printf "%s-cert-secret" .Release.Name) .Values.ray.ingress.tlsSecretName }}
{{- end }}
