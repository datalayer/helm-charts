{{- if eq .Values.ingressClass "datalayer-traefik" }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: iam-auth
  namespace: {{ .Release.Namespace }}
spec:
  forwardAuth:
    address: http://{{ .Release.Name }}-svc.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.iam.port }}/api/iam/v1/auth
    trustForwardHeader: true
    # authRequestHeaders:
    #   - "Authorization"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-root
  namespace: {{ .Release.Namespace }}
  labels:
    app: iam
spec:
  redirectRegex:
    regex: ^https://{{ template "iam.runHost" . }}/$
    replacement: https://datalayer.ai
    permanent: true
{{- end }}