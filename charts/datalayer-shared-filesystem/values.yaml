sharedStorage:
  # sharedStorage.shareName -- Specify Azure file share name (applicable for storageProvider being 'azure'). Existing or new Azure file share name. If empty, driver generates an Azure file share name.
  shareName: datalayer-shared-filesystem
  sharedFsPVC: shared-fs-pvc
  # sharedStorage.storageProvider -- Will set automatically value depending on the storage provider.
  # Supported values are: "azure", "aws", or "ceph"
  storageProvider: "ceph"
  # sharedStorage.storageClassName -- Storage class to use
  # If not specified the default value will be inferred from the provider.
  storageClassName: null
  # sharedStorage.storageSize -- Storage size
  # If not specified the default value will be inferred from the provider.
  storageSize: null
  storageOwner:
    # Must match sandbox container user uid/gid
    uid: '1000'
    gid: '100'
  aws:
    # sharedStorage.aws.fileSystemId -- AWS EFS filesystem id used by aws-efs StorageClass.
    # Auto-populated by plane up datalayer-shared-filesystem on kubeadm/AWS.
    fileSystemId: null
    # sharedStorage.aws.uid -- POSIX uid enforced by EFS Access Points created dynamically.
    # Set to "0" to allow prepare pod chown operations.
    uid: '0'
    # sharedStorage.aws.gid -- POSIX gid enforced by EFS Access Points created dynamically.
    # Set to "0" to allow prepare pod chown operations.
    gid: '0'
